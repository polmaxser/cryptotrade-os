services:
  postgres:
    image: postgres:16-alpine
    container_name: cryptotrade-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cryptotrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cryptotrade}
      POSTGRES_DB: ${POSTGRES_DB:-cryptotrade}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cryptotrade} -d ${POSTGRES_DB:-cryptotrade}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    container_name: cryptotrade-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      API_PORT: 4000
      API_HOST: 0.0.0.0
      API_PREFIX: api/v1
      CORS_ORIGIN: http://localhost:3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-cryptotrade}:${POSTGRES_PASSWORD:-cryptotrade}@postgres:5432/${POSTGRES_DB:-cryptotrade}?schema=public
    ports:
      - '4000:4000'

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
        NEXT_PUBLIC_APP_URL: http://localhost:3000
    container_name: cryptotrade-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:4000/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    ports:
      - '3000:3000'

volumes:
  postgres_data:
