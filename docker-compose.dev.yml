services:
  postgres:
    image: postgres:16-alpine
    container_name: cryptotrade-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cryptotrade}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cryptotrade}
      POSTGRES_DB: ${POSTGRES_DB:-cryptotrade}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cryptotrade} -d ${POSTGRES_DB:-cryptotrade}']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
